<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Small View – AI Orchestrated Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; min-height: 100vh;
  font-family: 'Inter', sans-serif;
  background: #eff1f8;
  overflow-x: hidden;
}

/* ═══ FIXED TOP BAR ═══ */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100; pointer-events: none;
}
.top-bar::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, #eff1f8 70%, transparent);
  pointer-events: none;
}
.top-bar-inner {
  position: relative;
  padding: 120px 0 0 117px;
  display: flex; flex-direction: column; gap: 20px;
  pointer-events: auto;
}
.page-title {
  font-weight: 500; font-size: 24px; line-height: 21px;
  color: rgba(0,0,0,0.95);
}
.tv-filters { display: flex; gap: 20px; align-items: center; }
.tv-filter-btn {
  display: flex; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer;
  font-size: 16px; font-family: 'Inter', sans-serif;
  color: #000; letter-spacing: -0.48px; padding: 0;
}
.tv-filter-btn svg { width: 20px; height: 20px; opacity: 0.6; }

/* ═══ PAGE LAYOUT ═══ */
.tsv-page {
  padding: 240px 117px 160px;
}

/* ═══ MAIN CARD CONTAINER ═══ */
.tsv-container {
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 2px 10px #eaecf4;
  display: flex;
  height: 565px;
  gap: 12px;
  padding: 8px;
  overflow: hidden;
  position: relative;
}

/* Clocked-in badge (top-left of container) */
.tsv-clocked-badge {
  position: absolute; top: 18px; left: 17px;
  background: #656565; border-radius: 80px;
  padding: 3px 10px 3px 8px;
  display: flex; align-items: center; gap: 6px;
  z-index: 10;
}
.tsv-clocked-badge svg { width: 14px; height: 14px; color: #fff; }
.tsv-clocked-badge span {
  font-size: 11.2px; font-weight: 500;
  color: #fff; line-height: 22.4px; white-space: nowrap;
}

/* ═══ MAIN ACTIVE AREA ═══ */
.tsv-main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  gap: 0;
  padding: 80px 24px 40px;
  overflow: hidden;
}

/* Featured "Me" row */
.tsv-featured {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
  margin-bottom: 32px;
}
.tsv-me-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
}

/* Me bubble cluster — positioned relative to me-wrap */
.tsv-bubbles {
  position: absolute;
  right: -100px;
  top: -50px;
  width: 180px;
  height: 180px;
  pointer-events: none;
}
.tsv-bubble {
  position: absolute;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
  letter-spacing: -0.16px;
  line-height: 1;
}
.bubble-light    { background: #dbe2ff; color: #062e69; }
.bubble-headsup  { background: #4766ff; color: #fff; }
.bubble-important{ background: #e68200; color: #fff; }
.bubble-critical { background: #e80d24; color: #fff; }

/* ═══ AVATAR SIZES ═══ */
.tsv-avatar-lg {
  width: 92px; height: 92px;
  border-radius: 7.2px; object-fit: cover; flex-shrink: 0;
  cursor: pointer;
}
.tsv-avatar-sm {
  width: 53px; height: 53px;
  border-radius: 7.2px; object-fit: cover; flex-shrink: 0;
  cursor: pointer;
}
.tsv-bubble { cursor: pointer; }
.emp-badge  { cursor: pointer; }

/* ═══ EMPLOYEE NAME CHIP ═══ */
.emp-chip {
  background: rgba(34,43,75,0.12);
  border-radius: 8px;
  padding: 2px 8px 2px 4px;
  font-size: 14px; font-weight: 500;
  color: rgba(0,0,0,0.95);
  letter-spacing: -0.14px;
  text-decoration: underline;
  text-decoration-style: dotted;
  white-space: nowrap;
  display: inline-block;
}

/* ═══ INFO CHIPS (location, schedule) ═══ */
.info-chips {
  display: flex; flex-direction: column;
  gap: 2px; align-items: center;
}
.info-chip {
  background: #fff;
  border-radius: 80px;
  padding: 0 8px 0 7px;
  display: flex; align-items: center; gap: 0;
  white-space: nowrap;
  height: 22px;
}
.info-chip svg {
  width: 14.4px; height: 14.4px;
  flex-shrink: 0; margin-right: 3px;
  color: rgba(0,0,0,0.45);
}
.info-chip span {
  font-size: 11.2px; font-weight: 400;
  color: #000; letter-spacing: -0.112px;
  line-height: 22.4px;
}

/* ═══ OTHER EMPLOYEES ROW ═══ */
.tsv-others {
  display: flex;
  gap: 40px;
  align-items: flex-start;
  justify-content: center;
  flex: 1;
}
.tsv-employee {
  display: flex; flex-direction: column;
  gap: 8px; align-items: center;
  position: relative;
}
/* Per-employee alert badge */
.emp-badge {
  position: absolute;
  top: -10px; right: -14px;
  border-radius: 100px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  line-height: 1;
  min-width: 28px; min-height: 28px;
  padding: 4px 8px;
  color: #fff;
}
.emp-badge.badge-critical  { background: #e80d24; }
.emp-badge.badge-important { background: #e68200; }
.emp-badge.badge-headsup   { background: #4766ff; }
.emp-badge.badge-light     { background: #dbe2ff; color: #062e69; }

/* ═══ RIGHT SIDEBAR (off-shift) ═══ */
.tsv-sidebar {
  background: #f3f3f3;
  border-radius: 20px;
  width: 195px; flex-shrink: 0;
  display: flex; flex-direction: column;
  gap: 40px;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
}
.tsv-off-employee {
  display: flex; flex-direction: column;
  gap: 8px; align-items: center;
}
.status-chip {
  border-radius: 80px;
  padding: 3px 10px 3px 8px;
  display: flex; align-items: center; gap: 6px;
}
.status-chip svg { width: 14.4px; height: 14.4px; flex-shrink: 0; }
.status-chip span {
  font-size: 11.2px; font-weight: 500;
  color: #fff; letter-spacing: -0.112px; line-height: 22.4px;
  white-space: nowrap;
}
.status-lunch   { background: rgba(0,0,0,0.43); }
.status-timeoff { background: #7532bc; }

/* ═══ FROSTED ASK BAR ═══ */
.ask-bar {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; align-items: center; z-index: 150;
  filter: drop-shadow(0px 8px 40px rgba(189,195,214,0.4));
}
.fv-prompt-field {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  border-radius: 24px; height: 62px; width: 500px;
  display: flex; align-items: center; gap: 4px;
  padding: 4px 12px 4px 16px;
}
.fv-prompt-inner {
  flex: 1; display: flex; gap: 11px; align-items: center; min-width: 0;
}
.fv-bryte-icon {
  width: 32px; height: 32px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg,#6B3FD4 0%,#4B2DB0 100%);
  border-radius: 50%;
}
.fv-bryte-icon svg { width: 18px; height: 18px; fill: #fff; }
.fv-placeholder {
  font-size: 16px; font-weight: 400; color: rgba(0,0,0,0.6);
  letter-spacing: -0.16px;
}
.fv-prompt-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.fv-icon-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
  background: #eef0f7; display: flex; align-items: center; justify-content: center;
}
.fv-icon-btn svg { width: 20px; height: 20px; color: rgba(0,0,0,0.55); }
.fv-round-btn {
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.fv-round-btn svg { width: 32px; height: 32px; color: rgba(0,0,0,0.65); }

/* ═══ ZOOM CONTROL ═══ */
.tsv-zoom {
  position: fixed; bottom: 120px; right: 120px;
  background: #fff; border-radius: 27.667px;
  box-shadow: 0 6.4px 32px rgba(189,195,214,0.4);
  display: flex; align-items: center;
  height: 38px; padding: 3px;
  z-index: 50;
}
.tsv-zoom-pct {
  padding: 0 14px;
  font-size: 14px; font-weight: 400;
  color: rgba(0,0,0,0.6); letter-spacing: -0.16px;
  white-space: nowrap;
}
.tsv-zoom-btn {
  width: 32px; height: 32px; border: none; background: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; color: rgba(0,0,0,0.55);
  font-size: 18px; font-weight: 400;
}
.tsv-zoom-divider {
  width: 0.553px; height: 32px; background: rgba(0,0,0,0.1);
}
</style>
</head>

  <div class="tsv-zoom-divider"></div>
  <span class="tsv-zoom-pct" id="zoom-pct">100%</span>

  <button class="tsv-zoom-btn" id="zoom-plus">+</button>

<script>
/* Zoom control */
let zoomLevel = 100;
const zoomPct = document.getElementById('zoom-pct');
const card = document.querySelector('.tsv-container');

document.getElementById('zoom-plus').addEventListener('click', () => {
  zoomLevel = Math.min(200, zoomLevel + 10);
  zoomPct.textContent = zoomLevel + '%';
  card.style.transform = `scale(${zoomLevel / 100})`;
  card.style.transformOrigin = 'top left';
});
document.getElementById('zoom-minus').addEventListener('click', () => {
  zoomLevel = Math.max(50, zoomLevel - 10);
  zoomPct.textContent = zoomLevel + '%';
  card.style.transform = `scale(${zoomLevel / 100})`;
  card.style.transformOrigin = 'top left';
});
</script>
</body>
</html>
